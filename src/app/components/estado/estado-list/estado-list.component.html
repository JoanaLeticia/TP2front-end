<mat-toolbar color="primary">
    <div class="flex-container">
        <span class="toolbar-title">Controle de Estados</span>
        <div class="search-container">
            <mat-form-field appearance="fill" class="custom-search-field">
                <mat-label>Pesquisar estado</mat-label>
                <input matInput 
                       [(ngModel)]="termoPesquisa"
                       (keyup)="pesquisar()">
                <button mat-icon-button matSuffix (click)="pesquisar()">
                    <mat-icon>search</mat-icon>
                </button>
            </mat-form-field>
            <mat-form-field appearance="fill" class="sort-field">
                <mat-label>Ordenar por</mat-label>
                <mat-select [(value)]="ordenacao" (selectionChange)="aplicarOrdenacao()">
                    <mat-option value="id">Padrão</mat-option>
                    <mat-option value="nome_asc">A-Z</mat-option>
                    <mat-option value="nome_desc">Z-A</mat-option>
                </mat-select>
            </mat-form-field>
        </div>
        <button mat-fab class="accent" routerLink="/estados/new">
            <mat-icon>add</mat-icon>
        </button>
    </div>
</mat-toolbar>

<table mat-table [dataSource]="estados" class="mat-elevation-z8">

    <!-- id Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> No. </th>
      <td mat-cell *matCellDef="let element"> {{element.id}} </td>
    </ng-container>
  
    <!-- nome Column -->
    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef> Nome </th>
      <td mat-cell *matCellDef="let element"> {{element.nome}} </td>
    </ng-container>
  
    <!-- sigla Column -->
    <ng-container matColumnDef="sigla">
      <th mat-header-cell *matHeaderCellDef> Sigla </th>
      <td mat-cell *matCellDef="let element"> {{element.sigla}} </td>
    </ng-container>

    <!-- acao Column -->
    <ng-container matColumnDef="acao">
        <th mat-header-cell *matHeaderCellDef> Ação </th>
        <td mat-cell *matCellDef="let element"> 
            <button mat-icon-button 
                color="primary"
                routerLink="/estados/edit/{{element.id}}">
                <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warm">
                <mat-icon>delete</mat-icon>
            </button>
        </td>
    </ng-container>
  
  
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
<mat-paginator
    [length]="totalRecords"
    [pageSizeOptions]="[2, 4, 8, 16]"
    [pageSize]="pageSize"
    (page)="paginar($event)">
</mat-paginator>
