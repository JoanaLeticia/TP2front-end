<mat-card class="card-produto">
    <div style="display: flex; flex-direction: column; align-items: center;">
        <img mat-card-image [src]="produto.urlImagem" alt="{{ produto.titulo }}" />
        <mat-card-title class="card-titulo">{{ produto.titulo }}</mat-card-title>
        <p class="card-info">{{ produto.plataforma }} • {{ produto.midia }}</p>
    </div>
    <div>
        <mat-card-content>
            <p class="preco">R$ {{ produto.preco | number:'1.2-2' }}</p>
        </mat-card-content>
        <mat-card-actions>
            <button mat-button color="primary" (click)="onAdicionar()" class="botao-carrinho"
                style="color: #fff;">Adicionar ao carrinho</button>
        </mat-card-actions>
    </div>
</mat-card>
